name: Quality Checks

on:
  workflow_call:

jobs:
  find-gomods:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.finder.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: dbut2/x/.github/actions/finder@main
        id: finder
        with:
          find: go.mod

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: find-gomods
    strategy:
      matrix: ${{ fromJSON(needs.find-gomods.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - run: go mod download
        working-directory: ${{ matrix.dir }}
      - run: go test -v ./...
        working-directory: ${{ matrix.dir }}

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: find-gomods
    strategy:
      matrix: ${{ fromJSON(needs.find-gomods.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - run: go mod download
        working-directory: ${{ matrix.dir }}
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.dir }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: find-gomods
    strategy:
      matrix: ${{ fromJSON(needs.find-gomods.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - run: go mod download
        working-directory: ${{ matrix.dir }}
      - run: go build ./...
        working-directory: ${{ matrix.dir }}

  tidy:
    name: Go Mod Tidy
    runs-on: ubuntu-latest
    needs: find-gomods
    strategy:
      matrix: ${{ fromJSON(needs.find-gomods.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - run: go mod tidy
        working-directory: ${{ matrix.dir }}
      - run: git diff --exit-code go.mod go.sum
        working-directory: ${{ matrix.dir }}

  generate:
    name: Go Generate
    runs-on: ubuntu-latest
    needs: find-gomods
    strategy:
      matrix: ${{ fromJSON(needs.find-gomods.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - run: go mod download
        working-directory: ${{ matrix.dir }}
      - run: go generate ./...
        working-directory: ${{ matrix.dir }}
      - run: git diff --exit-code
        working-directory: ${{ matrix.dir }}
